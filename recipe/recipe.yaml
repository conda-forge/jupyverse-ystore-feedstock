schema_version: 1

context:
  version: "0.1.1"

package:
  name: jupyverse-ystore
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-ystore/jupyverse_ystore-${{ version }}.tar.gz
    sha256: 204ebc78418e99adbb112940040088219060dc0d1a249ae4a1b376ec6a062b95

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - pycrdt

tests:
  - python:
      imports: jupyverse_ystore
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/ystore
  summary: The API for Jupyverse's YStore.

extra:
  recipe-maintainers:
    - davidbrochart
